<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice roller - 7th sea</title>
    <style>
        :root { 
            --primary: #38bdf8; --bg: #f8fafc; --card: #ffffff; 
            --accent: #f59e0b; --success: #10b981; --text: #1e293b;
            --border: #e2e8f0; --input-bg: #f1f5f9; --footer: rgba(0,0,0,0.6);
        }
        [data-theme="dark"] { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #334155; --input-bg: #0f172a; --footer: rgba(255,255,255,0.6);
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; 
            transition: all 0.3s ease; min-height: 100vh;
        }
        .header-tools { width: 100%; max-width: 380px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .theme-toggle { background: var(--card); border: 2px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; box-sizing: border-box; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; }
        input[type="number"], select { width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        
        .option-tile { display: flex; align-items: center; background: var(--input-bg); border: 2px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-size: 0.85rem; }
        .option-tile.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        
        button.main-btn { width: 100%; padding: 18px; background: var(--primary); color: #0f172a; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; margin-top: 10px; cursor: pointer; }
        button.reroll { width: 100%; padding: 12px; background: var(--accent); margin-top: 8px; display: none; color: #0f172a; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .summary-box { background: var(--primary); color: #0f172a; padding: 18px; border-radius: 15px; text-align: center; margin: 20px 0; font-weight: 900; font-size: 1.4rem; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); width: 100%; max-width: 380px; box-sizing: border-box; }
        #results { width: 100%; max-width: 380px; }
        
        .die { display: inline-flex; width: 45px; height: 45px; align-items: center; justify-content: center; background: var(--input-bg); border: 2px solid var(--primary); border-radius: 10px; margin: 5px; font-weight: bold; font-size: 1.2rem; cursor: pointer; position: relative; color: var(--text); }
        .die.selected { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 15px var(--accent); }
        .ext-badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #000; font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; }
        
        .set { background: rgba(16, 185, 129, 0.1); border-left: 5px solid var(--success); padding: 14px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .set-15 { border-left-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .set-10 { border-left-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        
        .inc-badge { background: var(--text); color: var(--card); padding: 2px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 800; }
        .waste { background: rgba(239, 68, 68, 0.1); border-left: 5px solid #ef4444; padding: 12px; border-radius: 12px; color: #ef4444; font-weight: bold; margin-top: 10px; }

        h3 { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; margin: 25px 0 10px 0; letter-spacing: 1px; }
        .footer-noemi { text-align: center; padding: 40px 10px; font-size: 0.85em; color: var(--footer); width: 100%; }
        .link-noemi { color: inherit; text-decoration: none; font-weight: 600; border-bottom: 1px solid currentColor; }
    </style>
</head>
<body data-theme="dark">

    <div class="header-tools">
        <div class="theme-toggle" onclick="toggleTheme()">TEMA 🌓</div>
    </div>

    <div class="card">
        <div class="grid">
            <div><label>N. Dadi</label><input type="number" id="count" value="5"></div>
            <div>
                <label>Obiettivo</label>
                <select id="target" onchange="render()">
                    <option value="10">Somma 10</option>
                    <option value="15">Somma 15 (+10)</option>
                </select>
            </div>
        </div>
        <label class="option-tile" id="tile1"><input type="checkbox" id="plus1" onchange="uS('tile1', this)"><span>Aggiungi +1 ad ogni dado</span></label>
        <label class="option-tile" id="tile2"><input type="checkbox" id="expl" onchange="uS('tile2', this)"><span>Esplosione del 10</span></label>
        
        <button class="main-btn" onclick="firstRoll()">LANCIA DADI</button>
        <button id="rerollBtn" class="reroll" onclick="rerollSelected()">RILANCIA SELEZIONATO</button>
    </div>

    <div id="results"></div>

    <footer class="footer-noemi">
        <p>Progetto e idea di <a href="mailto:noemi.marcolini@gmail.com" class="link-noemi">Noemi Marcolini</a></p>
    </footer>

    <script>
        let currentDice = [];
        let rerollAvailable = true;

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function uS(id, cb) { document.getElementById(id).classList.toggle('active', cb.checked); }

        function rollSingle(isExtra = false) {
            const p1 = document.getElementById('plus1').checked;
            const r = Math.floor(Math.random() * 10) + 1;
            return { val: r + (p1 ? 1 : 0), natural: r, exploded: isExtra, selected: false };
        }

        function firstRoll() {
            rerollAvailable = true;
            const n = parseInt(document.getElementById('count').value) || 0;
            currentDice = [];
            for (let i = 0; i < n; i++) {
                let d = rollSingle(false);
                currentDice.push(d);
                if (document.getElementById('expl').checked && d.natural === 10) rollExtra();
            }
            render();
        }

        function rollExtra() {
            let extra = rollSingle(true);
            currentDice.push(extra);
            if (extra.natural === 10) rollExtra();
        }

        function toggleSelect(index) {
            if (!rerollAvailable) return;
            const wasSelected = currentDice[index].selected;
            currentDice.forEach(d => d.selected = false);
            currentDice[index].selected = !wasSelected;
            render();
        }

        function rerollSelected() {
            if (!rerollAvailable) return;
            let idx = currentDice.findIndex(d => d.selected);
            if(idx !== -1) {
                currentDice.splice(idx, 1);
                let d = rollSingle(false);
                currentDice.push(d);
                if (document.getElementById('expl').checked && d.natural === 10) rollExtra();
                rerollAvailable = false;
            }
            render();
        }

        function findBestPartition(dice, targetMode) {
            let best = { sets: [], leftovers: [...dice], totalIncrements: 0, score: -Infinity };
            const diceValues = [...dice].sort((a, b) => b - a);

            function solve(remaining, currentSets) {
                let foundAny = false;

                for (let size = 1; size <= remaining.length; size++) {
                    const combos = getCombos(remaining, size);
                    for (const combo of combos) {
                        const sum = combo.reduce((a, b) => a + b, 0);
                        let type = 0;
                        let incValue = 0;

                        if (targetMode === 15) {
                            if (sum >= 15) { type = 15; incValue = 2; }
                            else if (sum >= 10) { type = 10; incValue = 1; }
                        } else if (sum >= 10) {
                            type = 10; incValue = 1;
                        }

                        if (type > 0) {
                            foundAny = true;
                            const nextRem = [...remaining];
                            combo.forEach(v => nextRem.splice(nextRem.indexOf(v), 1));
                            currentSets.push({ v: combo, t: sum, type: type, inc: incValue });
                            solve(nextRem, currentSets);
                            currentSets.pop();
                        }
                    }
                }

                const totalInc = currentSets.reduce((acc, s) => acc + s.inc, 0);
                const totalWaste = currentSets.reduce((acc, s) => acc + (s.t - s.type), 0);
                const score = (totalInc * 1000000) - (totalWaste * 100) - remaining.length;

                if (score > best.score) {
                    best.score = score;
                    best.sets = JSON.parse(JSON.stringify(currentSets));
                    best.leftovers = [...remaining];
                    best.totalIncrements = totalInc;
                }
            }

            function getCombos(arr, k) {
                const results = [];
                function helper(start, current) {
                    if (current.length === k) { results.push([...current]); return; }
                    for (let i = start; i < arr.length; i++) {
                        current.push(arr[i]);
                        helper(i + 1, current);
                        current.pop();
                    }
                }
                helper(0, []);
                return results;
            }

            solve(diceValues, []);
            return best;
        }

        function render() {
            if (currentDice.length === 0) return;
            const target = parseInt(document.getElementById('target').value);
            const resDiv = document.getElementById('results');
            document.getElementById('rerollBtn').style.display = (rerollAvailable && currentDice.some(d => d.selected)) ? 'block' : 'none';

            let html = '<h3>Dadi Lanciati</h3><div style="text-align:center;">';
            currentDice.forEach((d, i) => {
                html += `<div class="die ${d.selected ? 'selected' : ''}" onclick="toggleSelect(${i})">${d.val}${d.exploded ? '<span class="ext-badge">EXT</span>' : ''}</div>`;
            });

            const result = findBestPartition(currentDice.map(d => d.val), target);
            html += `</div><div class="summary-box">${result.totalIncrements} ${result.totalIncrements === 1 ? 'INCREMENTO' : 'INCREMENTI'}</div>`;
            
            if (result.sets.length > 0) {
                html += '<h3>Combinazioni</h3>';
                result.sets.forEach(s => {
                    let setClass = s.type === 15 ? 'set-15' : 'set-10';
                    html += `<div class="set ${setClass}">
                                <span>${s.v.join(' + ')} = <b>${s.t}</b></span>
                                <span class="inc-badge">+${s.inc} INC</span>
                             </div>`;
                });
            }

            if (result.leftovers.length > 0) {
                html += `<h3>Scarti</h3><div class="waste">Scarti: ${result.leftovers.sort((a,b)=>b-a).join(', ')}</div>`;
            }
            resDiv.innerHTML = html;
        }
    </script>
</body>
</html>
