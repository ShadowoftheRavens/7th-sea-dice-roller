<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice roller - 7th sea</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-theme="dark">

    <div class="header-tools">
        <div class="theme-toggle" id="themeToggle">TEMA 🌓</div>
    </div>

    <div class="card">
        <div class="grid">
            <div><label>N. Dadi</label><input type="number" id="count" value="5"></div>
            <div>
                <label>Obiettivo</label>
                <select id="target">
                    <option value="10">Somma 10</option>
                    <option value="15">Somma 15 (+10)</option>
                </select>
            </div>
        </div>

        <div class="bonus-section">
            <span>Aggiungi bonus a ogni dado:</span>
            <select id="bonusValue">
                <option value="0">0</option>
                <option value="1">+1</option>
                <option value="2">+2</option>
                <option value="3">+3</option>
                <option value="4">+4</option>
                <option value="5">+5</option>
            </select>
        </div>

        <label class="option-tile" id="tile2"><input type="checkbox" id="expl"><span>Esplosione del 10</span></label>
        
        <button class="main-btn" id="rollBtn">LANCIA DADI</button>
        <button id="rerollBtn" class="reroll">RILANCIA SELEZIONATO</button>
    </div>

    <div id="results"></div>

    <footer class="footer-noemi">
        <p>Progetto e idea di <a href="mailto:noemi.marcolini@gmail.com" class="link-noemi">Noemi Marcolini</a></p>
    </footer>

    <script type="module" src="./app.mjs"></script>
</body>
</html>
